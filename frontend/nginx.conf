# AtlasAI Frontend — Nginx Production Config
# Serves the built Vite SPA and proxies /api to the auth-service backend
 
server {
    listen 80;
    server_name _;
 
    root /usr/share/nginx/html;
    index index.html;
 
    # ─── Gzip compression ───────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        font/woff
        font/woff2;
 
    # ─── Security headers ───────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
 
    # ─── API proxy — forwards /api/* to auth-service on Railway ───
    location /api/ {
        proxy_pass https://agentic-workflow-automator-production.up.railway.app;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host agentic-workflow-automator-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
 
        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;
    }
 
    # ─── Static assets with long cache ──────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
 
    location /founder/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
 
    # ─── SPA fallback — all other routes → index.html ───
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
 
    # ─── Deny access to hidden files ────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
 
    # ─── Health check endpoint (returns 200) ────
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
