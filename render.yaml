# ═══════════════════════════════════════════════════════════════════
# AtlasAI — Render Blueprint (Infrastructure as Code)
# Defines all microservices + PostgreSQL for the platform.
# ═══════════════════════════════════════════════════════════════════
# How it works:
# 1. Sign up at https://render.com (GitHub OAuth)
# 2. Connect this GitHub repo in the Render Dashboard
# 3. Render reads this file and deploys everything automatically
# ═══════════════════════════════════════════════════════════════════

databases:
  - name: atlasai-db
    plan: free        # 1GB storage, expires after 30 days (dev/demo only)
    region: oregon
    databaseName: atlasai
    databaseUser: atlasai
    ipAllowList: []   # Allow all connections (within Render network)

services:
  # ─── Auth Service (Port 8081) ──────────────────────────────────
  - type: web
    name: auth-service
    env: docker
    region: oregon
    plan: free
    rootDir: services/auth-service
    dockerfilePath: Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atlasai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true   # Auto-generated, stored in Render
      - key: SERVER_PORT
        value: "8081"
      - key: SPRING_PROFILES_ACTIVE
        value: production

  # ─── Customer Service (Port 8082) ──────────────────────────────
  - type: web
    name: customer-service
    env: docker
    region: oregon
    plan: free
    rootDir: services/customer-service
    dockerfilePath: Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atlasai-db
          property: connectionString
      - key: JWT_SECRET
        fromService:
          name: auth-service
          source: env
          key: JWT_SECRET
      - key: SERVER_PORT
        value: "8082"
      - key: SPRING_PROFILES_ACTIVE
        value: production

  # ─── Workflow Service (Port 8083) ──────────────────────────────
  - type: web
    name: workflow-service
    env: docker
    region: oregon
    plan: free
    rootDir: services/workflow-service
    dockerfilePath: Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atlasai-db
          property: connectionString
      - key: JWT_SECRET
        fromService:
          name: auth-service
          source: env
          key: JWT_SECRET
      - key: SERVER_PORT
        value: "8083"
      - key: SPRING_PROFILES_ACTIVE
        value: production

  # ─── Task Service (Port 8084) ──────────────────────────────────
  - type: web
    name: task-service
    env: docker
    region: oregon
    plan: free
    rootDir: services/task-service
    dockerfilePath: Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atlasai-db
          property: connectionString
      - key: JWT_SECRET
        fromService:
          name: auth-service
          source: env
          key: JWT_SECRET
      - key: SERVER_PORT
        value: "8084"
      - key: SPRING_PROFILES_ACTIVE
        value: production

  # ─── AI Agent Service (Port 8087) ──────────────────────────────
  - type: web
    name: ai-agent-service
    env: docker
    region: oregon
    plan: free
    rootDir: services/ai-agent-service
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false   # User must set this manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: atlasai-db
          property: connectionString
      - key: AUTH_SERVICE_URL
        fromService:
          name: auth-service
          type: web
          property: host   # Internal hostname for service-to-service calls
      - key: CUSTOMER_SERVICE_URL
        fromService:
          name: customer-service
          type: web
          property: host
      - key: SERVER_PORT
        value: "8087"

  # ─── Frontend (Port 80) ────────────────────────────────────────
  - type: web
    name: frontend
    env: docker
    region: oregon
    plan: free
    rootDir: frontend
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      # These URLs are substituted into nginx.conf at container boot
      # via docker-entrypoint.sh (envsubst). The default values in the
      # entrypoint script are used if Render doesn't inject these.
      - key: AUTH_SERVICE_URL
        fromService:
          name: auth-service
          type: web
          property: host
      - key: CUSTOMER_SERVICE_URL
        fromService:
          name: customer-service
          type: web
          property: host
      - key: WORKFLOW_SERVICE_URL
        fromService:
          name: workflow-service
          type: web
          property: host
      - key: TASK_SERVICE_URL
        fromService:
          name: task-service
          type: web
          property: host
