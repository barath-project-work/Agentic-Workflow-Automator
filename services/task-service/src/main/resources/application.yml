server:
  port: ${PORT:8084}

spring:
  application:
    name: task-service

  datasource:
    url: jdbc:postgresql://localhost:5432/atlasai
    username: atlasai
    password: atlasai_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET:atlasai-dev-jwt-secret-key-minimum-256-bits-long-for-hs256}

logging:
  level:
    com.atlasai: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
