server:
  port: 8082

spring:
  application:
    name: customer-service

  datasource:
    url: jdbc:postgresql://localhost:5432/atlasai
    username: atlasai
    password: atlasai_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${JWT_SECRET:atlasai-dev-jwt-secret-key-minimum-256-bits-long-for-hs256}

logging:
  level:
    com.atlasai: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
