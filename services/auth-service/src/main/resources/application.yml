server:
  port: ${PORT:8081}

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/atlasai
    username: atlasai
    password: atlasai_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET:atlasai-dev-jwt-secret-key-minimum-256-bits-long-for-hs256}
    expiration-ms: 3600000  # 1 hour
    refresh-expiration-ms: 604800000  # 7 days

logging:
  level:
    com.atlasai: DEBUG
    org.springframework.security: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
